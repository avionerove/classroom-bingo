<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>빙고 - 학생 입장</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wrap">

  <!-- 1. 입장 화면 -->
  <div id="loginScreen" class="center">
    <div class="card">
      <h1>🎯 빙고 게임</h1>
      <p class="sub">이름을 입력하고 입장하세요.</p>
      <label for="nameInput">내 이름</label>
      <div class="row">
        <input class="grow" type="text" id="nameInput" placeholder="예) 김민수" maxlength="12" autocomplete="off">
        <button id="joinBtn">입장</button>
      </div>
      <p class="hint">선생님 화면이 필요하면 주소 끝에 <b>/teacher</b> 를 붙이세요.</p>
    </div>
  </div>

  <!-- 2. 게임 화면 -->
  <div id="gameScreen" class="hidden">
    <div id="titleBox" class="title-box hidden">
      <div id="gameTitle" class="title-main hidden"></div>
      <div id="gameDesc" class="title-sub hidden"></div>
    </div>
    <div class="flex-between" style="margin-bottom:14px;">
      <h1 id="helloName">🎯 빙고</h1>
      <span class="pill" id="rulePill">규칙</span>
    </div>

    <div id="banner" class="banner wait">대기 중...</div>

    <!-- 배치 단계: 모래시계 타이머 -->
    <div id="timerBox" class="timer hidden">
      <span class="glass">⏳</span>
      <div class="timer-main">
        <div class="timer-label">스티커 붙이기 남은 시간</div>
        <div class="timer-time" id="timerTime">--:--</div>
        <div class="timer-bar"><i id="timerBar"></i></div>
      </div>
    </div>

    <!-- 게임 단계: 지금 불린 문제 -->
    <div class="card call-display hidden" id="callCard">
      <div class="call-label">이번에 불린 문제 🔔</div>
      <div class="call-main" id="callMain">선생님이 문제를 부를 때까지 기다리세요</div>
      <p class="hint" id="calledHistory" style="margin-top:10px;"></p>
    </div>

    <!-- 배치 단계: 트레이 + 빙고판을 한 화면에 (태블릿은 좌우 배치) -->
    <div class="play-area" id="playArea">
      <!-- 스티커 트레이 -->
      <div id="trayCard" class="card hidden">
        <h2>① 스티커를 빈 칸으로 드래그하세요</h2>
        <p class="sub" id="trayHint">9칸을 모두 채워주세요. 칸끼리도 드래그로 위치를 바꿀 수 있어요.</p>
        <div class="tray" id="tray"></div>
        <div class="row" style="margin-top:12px;">
          <button class="secondary small" id="clearBoardBtn">전체 비우기</button>
          <button class="secondary small" id="autoFillBtn">자동 채우기(섞기)</button>
        </div>
      </div>

      <!-- 빙고판 -->
      <div class="card" id="boardCard">
        <h2 id="boardTitle">내 빙고판</h2>
        <div class="board" id="board"></div>
        <p class="hint" id="boardHint"></p>
      </div>
    </div>

    <!-- 빙고 버튼 -->
    <button id="bingoBtn" class="big green hidden">🎉 빙고!</button>

    <!-- 결과 -->
    <div id="resultCard" class="card hidden" style="text-align:center;">
      <div class="big-num" id="myRank">-</div>
      <p class="muted">등으로 빙고를 외쳤어요!</p>
    </div>

    <div class="card" id="winnerCard">
      <h2>🏆 빙고 순위</h2>
      <ul class="winner-list" id="winnerList"></ul>
      <p class="muted" id="noWinner">아직 빙고를 외친 친구가 없어요.</p>
    </div>
  </div>

</div>

<!-- 빙고 축하 오버레이 -->
<div id="celebrate" class="celebrate hidden"><div class="celebrate-inner" id="celebrateText"></div></div>

<div class="toast" id="toast"></div>
<script src="/celebrate.js"></script>
<script src="/student.js"></script>
</body>
</html>
